services:
  app:
    build: .
    container_name: backchannel_app
    command: ["python", "-m", "backchannel", "serve", "--host", "0.0.0.0", "--port", "8080", "--db", "/data/backchannel.db"]
    volumes:
      - backchannel_data:/data
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - shared_network

  worker:
    build: .
    container_name: backchannel_worker
    command: ["python", "-m", "backchannel", "worker", "--db", "/data/backchannel.db", "--interval", "86400"]
    volumes:
      - backchannel_data:/data
    env_file: .env
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: ./ui
    container_name: backchannel_frontend
    restart: unless-stopped
    depends_on:
      - app
    networks:
      - shared_network

volumes:
  backchannel_data:

networks:
  internal:
    driver: bridge
  shared_network:
    external: true
