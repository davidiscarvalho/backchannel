name: publish-sdk-ts

on:
  push:
    tags:
      - "tssdk-v*" # tag like tssdk-v0.1.2 triggers a release
  workflow_dispatch:
    # also runnable manually from the Actions tab

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/tssdk-v')
        working-directory: sdk/typescript
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#tssdk-v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
      - name: Install + build
        working-directory: sdk/typescript
        run: |
          npm install
          npm run build
      - name: Publish to npm
        working-directory: sdk/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
