name: publish-sdk-python

on:
  push:
    tags:
      - "sdk-v*" # tag like sdk-v0.1.1 triggers a release
  workflow_dispatch:
    # also runnable manually from the Actions tab

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: pip install --upgrade build twine
      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/sdk-v')
        working-directory: sdk/python
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#sdk-v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi
      - name: Build sdist + wheel
        working-directory: sdk/python
        run: python -m build
      - name: Check artifacts
        working-directory: sdk/python
        run: twine check dist/*
      - name: Publish to PyPI
        working-directory: sdk/python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_SDK_TOKEN }}
        run: twine upload dist/*
