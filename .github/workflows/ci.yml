name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: pip install pytest pytest-asyncio respx httpx "mcp>=1.0.0"
      - name: Run the test suite
        run: pytest tests/ mcp_server/tests/
