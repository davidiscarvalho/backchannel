services:
  app:
    build: .
    container_name: backchannel_app
    ports:
      - "8080:8080"
    volumes:
      - backchannel_data:/data
    environment:
      BACKCHANNEL_BASE_URL: ${BACKCHANNEL_BASE_URL:-}
      BACKCHANNEL_INVITATION_ONBOARDING_URL: ${BACKCHANNEL_INVITATION_ONBOARDING_URL:-}
      BACKCHANNEL_DEMO_KEY: ${BACKCHANNEL_DEMO_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - default
      - shared_network

  worker:
    build: .
    command: ["python", "-m", "backchannel", "worker", "--db", "/data/backchannel.db", "--interval", "86400"]
    volumes:
      - backchannel_data:/data
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    networks:
      - default

  frontend:
    build:
      context: ./ui
    container_name: backchannel_frontend
    ports:
      - "3000:80"
    depends_on:
      - app
    networks:
      - default
      - shared_network

volumes:
  backchannel_data:

networks:
  default:
  shared_network:
    external: true
